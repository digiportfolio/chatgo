<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ChatGO | AI Chatbot</title>

    <meta property="og:title" content="ChatGO | AI Chatbot">
    <meta property="og:description" content="Asisten AI cerdas dengan berbagai model. Chat langsung di browser!">
    <meta property="og:image" content="https://chatgo.up.railway.app/chatgo.png">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chatgo.up.railway.app/">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ChatGO | AI Chatbot">
    <meta name="twitter:description" content="Asisten AI cerdas dengan berbagai model. Chat langsung di browser!">
    <meta name="twitter:image" content="https://chatgo.up.railway.app/chatgo.png">

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

    <link rel="icon" type="image/png" sizes="32x32" href="/website_images/chatgo.png">
    <link rel="shortcut icon" href="/website_images/chatgo.png">
</head>
<body>
    <div class="chat-app">
        <div class="header">
            <h1>
                <img src="/website_images/chatgo.png" alt="ChatGO" style="height: 32px; width: auto; vertical-align: middle;"> ChatGO
                <span class="badge">AI Chatbot</span>
            </h1>
            <div class="header-controls">
                <select id="modelSelect">
                    <option value="" disabled selected hidden>Pilih Model AI</option>
                    <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                    <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
                </select>
                <button class="btn-clear" id="clearBtn">🗑️</button>
                <button class="btn-dark" id="darkModeBtn">🌙</button>
            </div>
        </div>

        <div class="messages" id="messages">
            <div class="message-wrapper ai">
                <div class="message ai">
                    👋 Halo, saya asisten AI! Tanya apa saja!<br>
                </div>
                <button class="copy-btn" onclick="copyMessage(this)">📋 Salin</button>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ketik pesan..." />
            <button class="btn-send" id="sendBtn">Kirim</button>
        </div>
    </div>

    <div class="toast" id="toast">✅ Tersalin!</div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-container">
            <div class="modal-icon">🗑️</div>
            <div class="modal-title">Hapus Percakapan?</div>
            <div class="modal-message">Semua pesan akan dihapus permanen.</div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" id="modalCancelBtn">Batal</button>
                <button class="modal-btn modal-btn-confirm" id="modalConfirmBtn">Hapus</button>
            </div>
        </div>
    </div>
</body>
</html>
